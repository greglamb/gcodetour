<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="400" height="220" viewBox="0 0 400 220">
  <rect x="0" y="0" width="400" height="220" fill="#ffffff"/>
  <!-- benign, untagged element -->
  <g id="benign">
    <rect x="20" y="20" width="120" height="50" fill="#dddddd" stroke="#333333"/>
    <text x="30" y="50">Untagged</text>
  </g>
  <!-- tagged element via plain href -->
  <a href="ct://el/orderApi">
    <rect x="160" y="20" width="120" height="50" fill="#cfe8ff" stroke="#333333"/>
    <text x="170" y="50">Order API</text>
  </a>
  <!-- tagged element via namespaced xlink:href -->
  <a xlink:href="ct://el/enrichQ">
    <rect x="160" y="120" width="120" height="50" fill="#cfe8ff" stroke="#333333"/>
    <text x="170" y="150">Enrich Queue</text>
  </a>
  <!-- hostile content the sanitizer must strip -->
  <script>window.__ctPwned = true;</script>
  <rect x="20" y="120" width="120" height="50" fill="#ffd0d0" onclick="window.__ctPwned = true"/>
  <image x="300" y="20" width="40" height="40" href="http://evil.example/track.png"/>
</svg>
