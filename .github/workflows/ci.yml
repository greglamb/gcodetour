name: CI

on:
  push:
    branches: [main]
  pull_request:

# The Playwright UI tests (test:ui) and the @vscode/test-electron integration
# tests (test:integration) need a real VS Code instance / browser download and
# are run locally only — CI runs the fast unit tier plus a build smoke test.
env:
  PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: "1"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: npm
      - run: npm ci
      - name: Verify (format, lint, compile, unit tests, build)
        run: npm run verify
