name: Release

# Manual only — trigger from the Actions tab → "Release" → "Run workflow".
# It packages the extension and creates a GitHub Release (tagged with the
# package.json version) with the .vsix attached. Bump the version first with
# `npm run version:bump`, then commit/push, then run this.
on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
      - run: npm install
      - name: Package extension
        run: npm run package
      - name: Create GitHub release with the VSIX
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION=$(node -p "require('./package.json').version")
          gh release create "v$VERSION" *.vsix --title "v$VERSION" --generate-notes
