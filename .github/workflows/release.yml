name: Release

# Manual only — trigger from the Actions tab → "Release" → "Run workflow".
# It verifies the project (format, lint, compile, unit tests, build), packages
# the extension, and creates a GitHub Release (tagged with the package.json
# version) with the .vsix attached. Bump the version first with
# `npm run version:bump`, then commit/push, then run this.
on:
  workflow_dispatch:

permissions:
  contents: write

# The Playwright UI tests and @vscode/test-electron integration tests need a
# real VS Code instance / browser and are run locally only; `verify` covers the
# fast unit tier plus a build smoke test, so skip the browser download here.
env:
  PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: "1"

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: npm
      - run: npm install
      - name: Verify (format, lint, compile, unit tests, build)
        run: npm run verify
      - name: Package extension
        run: npm run package
      - name: Create GitHub release with the VSIX
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION=$(node -p "require('./package.json').version")
          # Pin the tag to the exact commit this workflow built ($GITHUB_SHA),
          # so a release is always traceable to its source even if main moved.
          gh release create "v$VERSION" *.vsix --title "v$VERSION" --target "$GITHUB_SHA" --generate-notes
