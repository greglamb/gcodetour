name: Release

on:
  release:
    types:
      - created

permissions:
  contents: write

jobs:
  Release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
      - run: npm install
      - name: Package extension
        run: npm run package
      - name: Attach VSIX to GitHub release
        run: gh release upload "${{ github.event.release.tag_name }}" *.vsix --clobber
        env:
          GH_TOKEN: ${{ github.token }}
